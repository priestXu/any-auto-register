services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: any-auto-register
    init: true
    restart: unless-stopped
    shm_size: 1gb
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${SOLVER_PUBLIC_PORT:-8889}:8889"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      SOLVER_PORT: 8889
      APP_DATA_DIR: /app/data
      APP_AUTO_START_SOLVER: "${APP_AUTO_START_SOLVER:-1}"
      APP_DISABLE_CONDA_WARNING: "1"
      APP_SOLVER_HEADLESS: "${APP_SOLVER_HEADLESS:-1}"
      APP_SOLVER_BROWSER_TYPE: "${APP_SOLVER_BROWSER_TYPE:-camoufox}"
    volumes:
      - any_auto_register_data:/app/data

volumes:
  any_auto_register_data:
