services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        ALL_PROXY: "${ALL_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-}"
        http_proxy: "${HTTP_PROXY:-}"
        https_proxy: "${HTTPS_PROXY:-}"
        all_proxy: "${ALL_PROXY:-}"
        no_proxy: "${NO_PROXY:-}"
    container_name: any-auto-register-dev
    init: true
    restart: unless-stopped
    shm_size: 1gb
    user: "0:0"
    ports:
      - "${APP_PORT:-8000}:8000"
      - "${SOLVER_PUBLIC_PORT:-8889}:8889"
    environment:
      HOST: 0.0.0.0
      HOME: /home/appuser
      XDG_CACHE_HOME: /home/appuser/.cache
      PORT: 8000
      SOLVER_PORT: 8889
      APP_DATA_DIR: /app/data
      APP_AUTO_START_SOLVER: "${APP_AUTO_START_SOLVER:-1}"
      APP_DISABLE_CONDA_WARNING: "1"
      APP_SOLVER_HEADLESS: "${APP_SOLVER_HEADLESS:-1}"
      APP_SOLVER_BROWSER_TYPE: "${APP_SOLVER_BROWSER_TYPE:-chromium}"
      APP_RELOAD: "1"
      APP_GROK2API_PYTHON: "${APP_GROK2API_PYTHON:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      ALL_PROXY: "${ALL_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
      all_proxy: "${ALL_PROXY:-}"
      no_proxy: "${NO_PROXY:-}"
    volumes:
      - ./any_auto_register_data:/app/data
      - ./cache:/home/appuser/.cache
      - ./main.py:/app/main.py:ro
      - ./api:/app/api:ro
      - ./core:/app/core:ro
      - ./platforms:/app/platforms:ro
      - ./services:/app/services:ro
